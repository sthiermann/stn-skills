<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="1200" height="200" fill="url(#bg)"/>
  <rect width="1200" height="200" fill="url(#grid)"/>
  <rect x="0" y="196" width="1200" height="4" fill="url(#accent)"/>

  <!-- Contract validation symbols -->
  <g opacity="0.25">
    <rect x="200" y="75" width="50" height="50" rx="6" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <polyline points="213,100 222,109 237,91" fill="none" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <line x1="260" y1="100" x2="310" y2="100" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.3"/>
  <g opacity="0.2">
    <rect x="320" y="75" width="50" height="50" rx="6" fill="none" stroke="#d97706" stroke-width="1.5"/>
    <polyline points="333,100 342,109 357,91" fill="none" stroke="#d97706" stroke-width="2"/>
  </g>

  <g opacity="0.2">
    <rect x="830" y="75" width="50" height="50" rx="6" fill="none" stroke="#d97706" stroke-width="1.5"/>
    <polyline points="843,100 852,109 867,91" fill="none" stroke="#d97706" stroke-width="2"/>
  </g>
  <line x1="890" y1="100" x2="940" y2="100" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.25"/>
  <g opacity="0.25">
    <rect x="950" y="75" width="50" height="50" rx="6" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <polyline points="963,100 972,109 987,91" fill="none" stroke="#f59e0b" stroke-width="2"/>
  </g>

  <!-- stn-skills label -->
  <text x="600" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#475569" text-anchor="middle" letter-spacing="2">STN-SKILLS</text>

  <!-- Title -->
  <text x="600" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" fill="#f8fafc" text-anchor="middle" letter-spacing="-1">Pipeline Handoff Validator</text>

  <!-- Tagline -->
  <text x="600" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Validate artifacts at pipeline boundaries — catch gaps before they propagate</text>
</svg>

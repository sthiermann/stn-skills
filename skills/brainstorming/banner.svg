<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="1200" height="200" fill="url(#bg)"/>
  <rect width="1200" height="200" fill="url(#grid)"/>
  <rect x="0" y="196" width="1200" height="4" fill="url(#accent)"/>

  <!-- Lens icons -->
  <circle cx="200" cy="100" r="18" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.25"/>
  <circle cx="200" cy="100" r="10" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.2"/>
  <circle cx="260" cy="85" r="14" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.2"/>
  <circle cx="245" cy="120" r="12" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.15"/>
  <circle cx="920" cy="90" r="16" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.2"/>
  <circle cx="980" cy="105" r="12" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.18"/>
  <circle cx="1000" cy="80" r="10" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.15"/>

  <!-- stn-skills label -->
  <text x="600" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#475569" text-anchor="middle" letter-spacing="2">STN-SKILLS</text>

  <!-- Title -->
  <text x="600" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#f8fafc" text-anchor="middle" letter-spacing="-1">Brainstorming</text>

  <!-- Tagline -->
  <text x="600" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Structured design exploration — from vague idea to validated spec</text>
</svg>

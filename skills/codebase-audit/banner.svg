<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="1200" height="200" fill="url(#bg)"/>
  <rect width="1200" height="200" fill="url(#grid)"/>
  <rect x="0" y="196" width="1200" height="4" fill="url(#accent)"/>

  <!-- Shield icons -->
  <g opacity="0.2" transform="translate(195, 78)">
    <path d="M12,0 L24,6 L24,18 C24,28 12,34 12,34 C12,34 0,28 0,18 L0,6 Z" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  </g>
  <g opacity="0.15" transform="translate(245, 90)">
    <path d="M10,0 L20,5 L20,15 C20,23 10,28 10,28 C10,28 0,23 0,15 L0,5 Z" fill="none" stroke="#ef4444" stroke-width="1.2"/>
  </g>
  <g opacity="0.18" transform="translate(950, 82)">
    <path d="M12,0 L24,6 L24,18 C24,28 12,34 12,34 C12,34 0,28 0,18 L0,6 Z" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  </g>
  <g opacity="0.14" transform="translate(990, 95)">
    <path d="M8,0 L16,4 L16,12 C16,18 8,22 8,22 C8,22 0,18 0,12 L0,4 Z" fill="none" stroke="#ef4444" stroke-width="1"/>
  </g>

  <!-- stn-skills label -->
  <text x="600" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#475569" text-anchor="middle" letter-spacing="2">STN-SKILLS</text>

  <!-- Title -->
  <text x="600" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#f8fafc" text-anchor="middle" letter-spacing="-1">Codebase Audit</text>

  <!-- Tagline -->
  <text x="600" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">13-domain evidence-based audits — verified findings, not guesswork</text>
</svg>

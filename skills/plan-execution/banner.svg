<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="1200" height="200" fill="url(#bg)"/>
  <rect width="1200" height="200" fill="url(#grid)"/>
  <rect x="0" y="196" width="1200" height="4" fill="url(#accent)"/>

  <!-- Checkpoint marks -->
  <g opacity="0.25" transform="translate(195, 82)">
    <polyline points="0,10 6,18 18,2" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g opacity="0.2" transform="translate(240, 95)">
    <polyline points="0,8 5,14 14,2" fill="none" stroke="#059669" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g opacity="0.15" transform="translate(220, 115)">
    <polyline points="0,8 5,14 14,2" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g opacity="0.2" transform="translate(945, 85)">
    <polyline points="0,10 6,18 18,2" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g opacity="0.18" transform="translate(985, 100)">
    <polyline points="0,8 5,14 14,2" fill="none" stroke="#059669" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g opacity="0.15" transform="translate(970, 75)">
    <polyline points="0,8 5,14 14,2" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- stn-skills label -->
  <text x="600" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#475569" text-anchor="middle" letter-spacing="2">STN-SKILLS</text>

  <!-- Title -->
  <text x="600" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#f8fafc" text-anchor="middle" letter-spacing="-1">Plan Execution</text>

  <!-- Tagline -->
  <text x="600" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Verified implementation — every task checked, every claim proven</text>
</svg>

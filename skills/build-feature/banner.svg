<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="1200" height="200" fill="url(#bg)"/>
  <rect width="1200" height="200" fill="url(#grid)"/>
  <rect x="0" y="196" width="1200" height="4" fill="url(#accent)"/>

  <!-- Pipeline flow -->
  <circle cx="210" cy="100" r="6" fill="#2563eb" opacity="0.3"/>
  <circle cx="250" cy="100" r="6" fill="#7c3aed" opacity="0.25"/>
  <circle cx="290" cy="100" r="6" fill="#059669" opacity="0.2"/>
  <line x1="216" y1="100" x2="244" y2="100" stroke="#475569" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="256" y1="100" x2="284" y2="100" stroke="#475569" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.3"/>

  <circle cx="910" cy="100" r="6" fill="#2563eb" opacity="0.25"/>
  <circle cx="950" cy="100" r="6" fill="#7c3aed" opacity="0.2"/>
  <circle cx="990" cy="100" r="6" fill="#059669" opacity="0.25"/>
  <line x1="916" y1="100" x2="944" y2="100" stroke="#475569" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.25"/>
  <line x1="956" y1="100" x2="984" y2="100" stroke="#475569" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.25"/>

  <!-- stn-skills label -->
  <text x="600" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#475569" text-anchor="middle" letter-spacing="2">STN-SKILLS</text>

  <!-- Title -->
  <text x="600" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#f8fafc" text-anchor="middle" letter-spacing="-1">Build Feature</text>

  <!-- Tagline -->
  <text x="600" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">End-to-end pipeline — brainstorm, plan, execute in one command</text>
</svg>

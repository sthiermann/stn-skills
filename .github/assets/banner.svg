<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>

  <!-- Accent line -->
  <rect x="0" y="296" width="1200" height="4" fill="url(#accent)"/>

  <!-- Pipeline dots -->
  <circle cx="340" cy="120" r="6" fill="#3b82f6" opacity="0.6"/>
  <circle cx="480" cy="120" r="6" fill="#7c3aed" opacity="0.6"/>
  <circle cx="620" cy="120" r="6" fill="#059669" opacity="0.6"/>
  <circle cx="760" cy="120" r="6" fill="#16a34a" opacity="0.6"/>
  <circle cx="900" cy="120" r="6" fill="#dc2626" opacity="0.6"/>
  <line x1="346" y1="120" x2="474" y2="120" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="486" y1="120" x2="614" y2="120" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="626" y1="120" x2="754" y2="120" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="766" y1="120" x2="894" y2="120" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Pipeline labels -->
  <text x="340" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Brainstorm</text>
  <text x="480" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Plan</text>
  <text x="620" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Execute</text>
  <text x="760" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Verify</text>
  <text x="900" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Audit</text>

  <!-- Title -->
  <text x="600" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#f8fafc" text-anchor="middle" letter-spacing="-1">stn-skills</text>

  <!-- Tagline -->
  <text x="600" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">Structured AI development — from first idea to verified code</text>
</svg>
